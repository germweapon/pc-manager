<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSens Manager - 로그인</title>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root{
  --bg-primary:#0f1117;--bg-secondary:#1a1d27;--bg-tertiary:#242736;--bg-card:#1e2130;--bg-hover:#2a2d3e;
  --border:#2e3144;--border-light:#3a3d50;
  --text-primary:#e8eaed;--text-secondary:#9aa0b0;--text-muted:#6b7185;
  --accent:#6c5ce7;--accent-light:#a29bfe;--accent-bg:rgba(108,92,231,0.12);
  --success:#00cec9;--success-bg:rgba(0,206,201,0.12);
  --warning:#fdcb6e;--warning-bg:rgba(253,203,110,0.12);
  --danger:#ff6b6b;--danger-bg:rgba(255,107,107,0.12);
  --info:#74b9ff;
  --radius-sm:6px;--radius-md:10px;--radius-lg:16px;--radius-xl:20px;
  --shadow:0 4px 24px rgba(0,0,0,0.3);--shadow-lg:0 8px 40px rgba(0,0,0,0.4);
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

.bg-decor{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-decor .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:float 12s ease-in-out infinite}
.bg-decor .orb:nth-child(1){width:500px;height:500px;background:var(--accent);top:-120px;right:-100px}
.bg-decor .orb:nth-child(2){width:400px;height:400px;background:var(--success);bottom:-100px;left:-80px;animation-delay:-4s}
.bg-decor .orb:nth-child(3){width:300px;height:300px;background:var(--danger);bottom:20%;right:15%;animation-delay:-8s;opacity:.07}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle at 1px 1px, rgba(108,92,231,0.06) 1px, transparent 0);
  background-size:32px 32px}

.login-wrapper{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}

/* Logo */
.login-logo{text-align:center;margin-bottom:36px}
.login-logo img{height:120px;margin-bottom:8px;filter:drop-shadow(0 4px 20px rgba(0,0,0,.4))}
.login-logo p{font-size:13px;color:var(--text-muted);letter-spacing:.3px}

/* Card */
.login-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--success),var(--accent-light));opacity:.7}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:7px;letter-spacing:.3px}
.input-wrap{position:relative}
.input-wrap i.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text-muted);transition:color .2s;pointer-events:none}
.input-wrap input{width:100%;padding:12px 14px 12px 42px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-primary);font-size:14px;font-family:inherit;transition:var(--transition)}
.input-wrap input:focus{outline:none;border-color:var(--accent);background:var(--bg-card);box-shadow:0 0 0 3px rgba(108,92,231,.15)}
.input-wrap input:focus ~ i.input-icon{color:var(--accent-light)}
.input-wrap input::placeholder{color:var(--text-muted);font-size:13px}
.input-wrap .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px;transition:color .2s}
.input-wrap .toggle-pw:hover{color:var(--text-primary)}

.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#5b4bd5);border:none;border-radius:var(--radius-md);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.3px;position:relative;overflow:hidden}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(108,92,231,0.4)}
.login-btn:active{transform:translateY(0)}
.login-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .3s}
.login-btn:hover::after{opacity:1}

.options-row{display:flex;align-items:center;margin-bottom:24px}
.remember-check{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:var(--text-secondary)}
.remember-check input[type="checkbox"]{appearance:none;width:16px;height:16px;border:1.5px solid var(--border-light);border-radius:4px;background:var(--bg-tertiary);cursor:pointer;position:relative;transition:var(--transition);flex-shrink:0}
.remember-check input[type="checkbox"]:checked{background:var(--accent);border-color:var(--accent)}
.remember-check input[type="checkbox"]:checked::after{content:'\eb7b';font-family:'remixicon';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px}

.divider{display:flex;align-items:center;gap:14px;margin:28px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.5px}

.signup-link{text-align:center;font-size:13px;color:var(--text-secondary)}
.signup-link a{color:var(--accent-light);font-weight:600;cursor:pointer;text-decoration:none;transition:color .2s}
.signup-link a:hover{color:#fff;text-decoration:underline}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:1000;opacity:0;transition:all .3s;pointer-events:none}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(255,107,107,.3)}
.toast.error i{color:var(--danger)}
.toast.success i{color:var(--success)}

.version-badge{position:fixed;bottom:20px;right:20px;font-size:11px;color:var(--text-muted);opacity:.4;z-index:1}

@media(max-width:480px){
  .login-wrapper{padding:16px}
  .login-card{padding:28px 22px}
  .login-logo img{height:90px}
}
</style>
</head>
<body>

<div class="bg-decor">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>
<div class="bg-grid"></div>

<div class="login-wrapper">
  <!-- Logo -->
  <div class="login-logo">
    <img src="logo.png" alt="아이센스리그 PC방">
    <p>PC방 통합 관리 시스템</p>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <div class="input-wrap">
          <input type="text" id="loginId" placeholder="아이디를 입력하세요" autocomplete="username" required>
          <i class="ri-user-3-line input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <div class="input-wrap">
          <input type="password" id="loginPw" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
          <i class="ri-lock-line input-icon"></i>
          <button type="button" class="toggle-pw" onclick="togglePassword('loginPw', this)">
            <i class="ri-eye-off-line"></i>
          </button>
        </div>
      </div>

      <div class="options-row">
        <label class="remember-check">
          <input type="checkbox" id="rememberMe">
          <span>로그인 상태 유지</span>
        </label>
      </div>

      <button type="submit" class="login-btn">
        <i class="ri-login-box-line"></i>
        로그인
      </button>
    </form>

    <div class="divider"><span>또는</span></div>

    <div class="signup-link">
      계정이 없으신가요? <a href="signup.html">회원가입</a>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <i class="ri-information-line"></i>
  <span id="toastTxt"></span>
</div>

<div class="version-badge">v1.0.0</div>

<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.className = 'ri-eye-line'; }
  else { input.type = 'password'; icon.className = 'ri-eye-off-line'; }
}

function showToast(msg, type = 'error') {
  const t = document.getElementById('toast');
  const icon = t.querySelector('i');
  t.className = 'toast ' + type;
  icon.className = type === 'error' ? 'ri-error-warning-line' : 'ri-checkbox-circle-line';
  document.getElementById('toastTxt').textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2500);
}

function handleLogin(e) {
  e.preventDefault();
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (!id) { showToast('아이디를 입력해주세요'); return; }
  if (!pw) { showToast('비밀번호를 입력해주세요'); return; }
  // 테스트: 바로 진입
  sessionStorage.setItem('isens_logged_in', 'true');
  sessionStorage.setItem('isens_user', id || 'admin');
  showToast('로그인 성공! 대시보드로 이동합니다', 'success');
  setTimeout(() => { window.location.href = 'index.html'; }, 800);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
});
</script>
</body>
</html>
